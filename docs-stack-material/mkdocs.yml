site_name: Docs Stack – Material

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Conventions: conventions.md
  - Guides:
      - Local Development: guides/local-development.md
      - Deployment: guides/deployment.md
      - Customization: guides/customization.md
  - API:
      - Overview: api/overview.md
      - Authentication: api/authentication.md
      - Database: api/database.md
      - Error Handling: api/error-handling.md
  - Projects:
      - Portfolio: projects/portfolio.md
      - Open Source:
          - Task Management Client: projects/github_repos/task-management-client.md
          - Content Publishing Engine: projects/github_repos/content-publishing-engine.md
          - Edu-Management System: projects/github_repos/edu-management-system.md
          - Portfolio UI Platform: projects/github_repos/portfolio-ui.md
          - Salary Analytics Engine: projects/github_repos/salary-analytics-engine.md
          - Noirel Ecommerce: projects/github_repos/noirel-ecommerce.md
          - Time Lens: projects/github_repos/time-lens-python.md
          - Cipher Analytics: projects/github_repos/cipher-analytics.md
          - WorkPilot:
              - Executive Overview: projects/github_repos/workpilot/index.md
              - Architecture Decisions (ADR): projects/github_repos/workpilot/adr.md
              - Multi-Tenancy & Database: projects/github_repos/workpilot/multi-tenant.md
              - Authentication & Security: projects/github_repos/workpilot/authentication.md
              - Backend Architecture: projects/github_repos/workpilot/backend.md
              - Frontend Architecture: projects/github_repos/workpilot/frontend.md
              - Developer Workflow: projects/github_repos/workpilot/workflow.md
  - Reference:
      - CLI: reference/cli.md
      - Configuration Options: reference/configuration-options.md
      - Glossary: reference/glossary.md

site_url: https://ashif-ek.github.io/docs-stack-material/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
